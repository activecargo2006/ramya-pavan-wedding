<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#F4ECDB">

  <title>Sri Ramya & Pavan Chowdary · 27 August 2026</title>
  <meta name="description" content="With the divine blessings of elders, we cordially invite you to the wedding of Sri Ramya & Vangalapati Pavan Chowdary.">

  <meta property="og:title" content="Sri Ramya & Pavan Chowdary · Wedding Invitation">
  <meta property="og:description" content="27 August 2026 · Cherukuri Gardens, Rajahmundry">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ramya-pavan-wedding.vercel.app">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>

  <!-- ============================================================
       SECTION 1 — THE ENVELOPE
       Tap the wax seal to open the invitation
       ============================================================ -->
  <section class="envelope-section" id="envelope">

    <!-- Decorative corner ornaments (CSS/SVG) -->
    <div class="envelope-corner corner-tl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="0.8" style="color: var(--gold-deep);">
        <path d="M5 5 Q 5 45 45 45 M 5 5 L 30 5 M 5 5 L 5 30" stroke-linecap="round"/>
        <circle cx="5" cy="5" r="2" fill="currentColor"/>
      </svg>
    </div>
    <div class="envelope-corner corner-tr">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="0.8" style="color: var(--gold-deep);">
        <path d="M5 5 Q 5 45 45 45 M 5 5 L 30 5 M 5 5 L 5 30" stroke-linecap="round"/>
        <circle cx="5" cy="5" r="2" fill="currentColor"/>
      </svg>
    </div>
    <div class="envelope-corner corner-bl">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="0.8" style="color: var(--gold-deep);">
        <path d="M5 5 Q 5 45 45 45 M 5 5 L 30 5 M 5 5 L 5 30" stroke-linecap="round"/>
        <circle cx="5" cy="5" r="2" fill="currentColor"/>
      </svg>
    </div>
    <div class="envelope-corner corner-br">
      <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="0.8" style="color: var(--gold-deep);">
        <path d="M5 5 Q 5 45 45 45 M 5 5 L 30 5 M 5 5 L 5 30" stroke-linecap="round"/>
        <circle cx="5" cy="5" r="2" fill="currentColor"/>
      </svg>
    </div>

    <div class="envelope-inner">

      <!-- Top eyebrow -->
      <div>
        <p class="envelope-eyebrow">An Invitation</p>
        <p class="envelope-telugu">శుభలేఖ</p>
      </div>

      <!-- The wax seal -->
      <div class="wax-seal" id="waxSeal" role="button" tabindex="0" aria-label="Open the wedding invitation">
        <span class="seal-monogram">R &amp; P</span>
      </div>

      <!-- Click to open -->
      <p class="envelope-prompt">Tap the seal to open</p>

      <!-- Date -->
      <p class="envelope-date">2 7 · 0 8 · 2 0 2 6</p>

    </div>

  </section>

  <!-- Section 2-7 will be built in subsequent blocks -->

  <script src="scripts/animations.js"></script>
</body>
</html>
